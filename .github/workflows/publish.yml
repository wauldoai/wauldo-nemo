name: CI & Publish

# Tests run on every push to main + PRs across the full supported Python
# matrix (3.9–3.12, matching pyproject `requires-python`/classifiers).
# Publishing happens only on a vX.Y.Z tag, via PyPI Trusted Publishing
# (OIDC) — no token, no stored secret. One-time PyPI setup: add a GitHub
# trusted publisher for this repo + this workflow filename (publish.yml).
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install ruff==0.14.2 # pinned so a new ruff release can't redden CI
      - run: ruff check
      - run: ruff format --check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - run: pytest -q

  publish:
    needs: [lint, test]
    # Only publish on a version tag — normal pushes/PRs just run the matrix.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
      contents: write # checkout + create the GitHub Release (write implies read)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$TAG  pyproject=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag $TAG != version $PKG"; exit 1; }

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true # auto notes from commits/PRs since last tag
          files: dist/* # attach the wheel + sdist to the release page
