name: CI & Publish

# Tests run on every push to main + PRs across the full supported Python
# matrix (3.9–3.12, matching pyproject `requires-python`/classifiers).
# Publishing happens only on a vX.Y.Z tag, via PyPI Trusted Publishing
# (OIDC) — no token, no stored secret. One-time PyPI setup: add a GitHub
# trusted publisher for this repo + this workflow filename (publish.yml).
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - run: pytest -q

  publish:
    needs: test
    # Only publish on a version tag — normal pushes/PRs just run the matrix.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
      contents: read # declaring permissions zeroes the rest — keep repo checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$TAG  pyproject=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag $TAG != version $PKG"; exit 1; }

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
