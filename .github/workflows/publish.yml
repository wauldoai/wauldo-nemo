name: Publish to PyPI

# Tag a release (vX.Y.Z) and this publishes to PyPI via Trusted Publishing
# (OIDC) — no token, no stored secret. One-time PyPI setup: add a GitHub
# trusted publisher for this repo + this workflow filename (publish.yml).
on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e '.[dev]'
      - run: pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
      contents: read # declaring permissions zeroes the rest — keep repo checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$TAG  pyproject=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag $TAG != version $PKG"; exit 1; }

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
